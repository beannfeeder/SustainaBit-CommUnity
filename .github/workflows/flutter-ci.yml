name: Flutter CI

on:
  push:

jobs:
  build-and-analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          channel: 'stable'
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Verify Flutter installation
        run: flutter --version
      
      - name: Analyze code
        run: flutter analyze
