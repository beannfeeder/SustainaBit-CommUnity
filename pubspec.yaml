name: sustainabit_community
description: SustainaBit CommUnity - Kitahack 2026 project with reusable architecture
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^17.1.0

  # State Management
  provider: ^6.1.0

  # Utilities
  shared_preferences: ^2.2.0
  http: ^1.2.0
  intl: ^0.20.2

  # UI
  flutter_svg: ^2.0.0
  flutter_secure_storage: ^10.0.0
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  google_sign_in: ^6.2.1

  # Web compatibility
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

